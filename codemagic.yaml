# Codemagic CI/CD — builds the Invite Karoo iOS app and ships it to TestFlight.
#
# ── One-time setup in the Codemagic web UI ──
# 1. Codemagic → Teams → Integrations → App Store Connect → add your API key
#    (Issuer ID + Key ID + the .p8). Name it exactly "InviteKaroo ASC".
# 2. Apple Developer → Identifiers → make sure com.invitekaroo.invitekaroo is
#    registered with the "Push Notifications" capability (Broadcast unticked).
# 3. App Store Connect → Apps → create the app for that bundle id.

workflows:
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: InviteKaroo ASC   # must match the integration name in Codemagic
    environment:
      # Codemagic's automatic signing: generates the private key, creates the
      # distribution certificate AND the app-store provisioning profile using
      # the App Store Connect integration below, and installs them.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.invitekaroo.invitekaroo
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \; || true
      - name: Apply code-signing profiles to the project
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true          # auto-upload to TestFlight after a green build
