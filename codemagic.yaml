# Codemagic CI/CD — builds the Invite Karoo iOS app and ships it to TestFlight.
#
# ── One-time setup in the Codemagic web UI ──
# 1. Codemagic → Teams → Integrations → App Store Connect → add your API key
#    (Issuer ID + Key ID + the .p8). Name it exactly "InviteKaroo ASC".
# 2. Apple Developer → Identifiers → com.invitekaroo.invitekaroo registered with
#    the "Push Notifications" capability (Broadcast unticked).
# 3. App Store Connect → Apps → create the app for that bundle id.

workflows:
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: InviteKaroo ASC   # must match the integration name in Codemagic
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.invitekaroo.invitekaroo"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \; || true
      - name: Set up code signing (generate key → create cert + profile)
        script: |
          keychain initialize
          # Apple can only ISSUE a certificate against a private key we own.
          # Generate one, then let fetch-signing-files create the distribution
          # certificate (with this key) AND the app-store provisioning profile.
          openssl genrsa -out /tmp/ik_cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/ik_cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
