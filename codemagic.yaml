# Codemagic CI/CD — builds the Invite Karoo iOS app and ships it to TestFlight.
#
# ── One-time setup in the Codemagic web UI (nothing to build locally) ──
# 1. Codemagic → Teams → Integrations → App Store Connect → add your API key
#    (Issuer ID + Key ID + the .p8 you downloaded). Give it a NAME.
# 2. Put that exact name in `integrations.app_store_connect` below
#    (replace "InviteKaroo ASC").
# 3. In Apple Developer → Identifiers → com.invitekaroo.invitekaroo, make sure
#    the "Push Notifications" capability is ENABLED (so the signing profile
#    Codemagic creates includes push).
# 4. In App Store Connect → Apps, create the app for com.invitekaroo.invitekaroo
#    (needed before TestFlight upload).
#
# Then just push to GitHub and start this workflow in Codemagic.

workflows:
  ios-testflight:
    name: iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: InviteKaroo ASC   # TODO: must match the integration name from step 1
    environment:
      ios_signing:
        distribution_type: app_store        # automatic signing → app-store provisioning profile
        bundle_identifier: com.invitekaroo.invitekaroo
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \; || true
      - name: Apply code-signing profiles
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true          # auto-upload to TestFlight after a green build
