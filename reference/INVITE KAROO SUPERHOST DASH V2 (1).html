<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Invite Karoo — Community Host Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800;9..144,900&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --t9:#1A0E3D;--t8:#2D1B69;--t7:#3D2582;--t6:#5B3E9E;--t5:#7C5CBF;
  --t4:#A07ED4;--t3:#C4AEE8;--t2:#D4C4EE;--t1:#EDE6F7;--t0:#F7F4FC;
  --g5:#B45309;--g4:#D97706;--g3:#F5A623;--g2:#FDE68A;--g1:#FEF3D5;
  --ok:#16A34A;--ok1:#DCFCE7;--er:#DC2626;--er1:#FEE2E2;
  --in:#1D4ED8;--in1:#DBEAFE;--wa:#D97706;--wa1:#FEF3D5;
  --ink:#1A1028;--ink2:#3D2D5C;--ink3:#6B5A8A;--ink4:#A89BC0;
  --cream:#F5EFE8;--cream2:#EDE5DB;--white:#fff;
  --bd:rgba(124,92,191,.14);--bd2:rgba(124,92,191,.24);
  --sh:0 1px 3px rgba(92,62,158,.07);--sh2:0 6px 24px rgba(92,62,158,.12);
  --ff:'Sora',sans-serif;--fd:'Fraunces',serif;--fm:'DM Mono','Sora',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--ff);color:var(--ink);background:var(--t0);-webkit-font-smoothing:antialiased;overflow:hidden;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:rgba(124,92,191,.22);border-radius:6px;border:2px solid transparent;background-clip:content-box;}
::-webkit-scrollbar-thumb:hover{background:rgba(124,92,191,.4);background-clip:content-box;}
svg{display:block;}
.mono{font-family:var(--fm);font-variant-numeric:tabular-nums;}
.disp{font-family:var(--fd);}

/* ───────────── LOGIN ───────────── */
#login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--t0);overflow:hidden;}
#login.hide{display:none;}
.lg-glow{position:absolute;border-radius:50%;pointer-events:none;}
.lg-card{position:relative;z-index:2;width:100%;max-width:386px;margin:20px;background:var(--white);border:1px solid var(--bd);border-radius:24px;padding:42px 38px 34px;box-shadow:0 28px 70px rgba(92,62,158,.16);animation:popUp .4s cubic-bezier(.22,1,.36,1) both;}
.lg-mk{width:56px;height:56px;border-radius:17px;background:linear-gradient(135deg,#7C5CBF,#3D2582);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 12px 28px rgba(92,62,158,.42);}
.lg-mk svg{width:30px;height:30px;stroke:#fff;fill:none;stroke-width:1.5;}
.lg-wm{text-align:center;font-family:var(--fd);font-size:1.5rem;font-weight:800;color:var(--ink);letter-spacing:-.4px;line-height:1;}
.lg-wm b{color:var(--g4);}
.lg-tag{text-align:center;font-size:.58rem;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:2.5px;margin-top:6px;}
.lg-div{height:1px;background:var(--bd);margin:26px 0 22px;}
.lg-brand{position:relative;overflow:hidden;background:linear-gradient(155deg,#1A0E3D 0%,#2D1B69 45%,#5B3E9E 100%);display:flex;flex-direction:column;justify-content:space-between;padding:48px 52px;color:#fff;}
.lg-orb{position:absolute;border-radius:50%;pointer-events:none;}
.lg-logo{display:flex;align-items:center;gap:13px;position:relative;z-index:2;}
.lg-logo .mk{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;}
.lg-logo .mk svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.5;}
.lg-name{font-family:var(--fd);font-size:1.5rem;font-weight:800;}
.lg-name em{font-style:normal;color:#fff;}.lg-name b{font-style:normal;color:var(--g3);}
.lg-hero{position:relative;z-index:2;}
.lg-eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(245,166,35,.16);border:1px solid rgba(245,166,35,.4);border-radius:8px;padding:5px 11px;font-size:.62rem;font-weight:800;color:var(--g2);text-transform:uppercase;letter-spacing:1px;margin-bottom:22px;}
.lg-h1{font-family:var(--fd);font-size:2.7rem;font-weight:800;line-height:1.08;letter-spacing:-.5px;margin-bottom:16px;}
.lg-h1 span{color:var(--g3);}
.lg-sub{font-size:.92rem;color:rgba(255,255,255,.62);line-height:1.6;max-width:400px;}
.lg-feats{position:relative;z-index:2;display:flex;flex-direction:column;gap:14px;}
.lg-feat{display:flex;align-items:center;gap:12px;font-size:.82rem;color:rgba(255,255,255,.8);font-weight:500;}
.lg-feat .fi{width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lg-feat .fi svg{width:15px;height:15px;stroke:var(--g3);fill:none;stroke-width:2;}
.lg-form-wrap{display:flex;align-items:center;justify-content:center;padding:40px;overflow-y:auto;}
.lg-form{width:100%;max-width:380px;}
.lg-form h2{font-family:var(--fd);font-size:1.7rem;font-weight:800;color:var(--ink);margin-bottom:6px;letter-spacing:-.3px;}
.lg-form .muted{font-size:.82rem;color:var(--ink3);margin-bottom:28px;line-height:1.5;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.66rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;}
.field .ip-wrap{position:relative;}
.field .ip-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--ink4);fill:none;stroke-width:1.9;}
input,select,textarea{width:100%;font-family:var(--ff);font-size:.86rem;color:var(--ink);background:var(--white);border:1.5px solid var(--bd2);border-radius:11px;padding:12px 14px;outline:none;transition:border-color .16s,box-shadow .16s;}
input:focus,select:focus,textarea:focus{border-color:var(--t6);box-shadow:0 0 0 3px rgba(124,92,191,.12);}
.field .ip-wrap input{padding-left:40px;}
.lg-otp{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:8px;}
.lg-otp input{text-align:center;font-family:var(--fm);font-size:1.2rem;font-weight:700;padding:11px 0;color:var(--t7);}
.lg-resend{font-size:.72rem;color:var(--ink4);text-align:center;margin-top:4px;}
.lg-resend b{color:var(--t7);font-family:var(--fm);}
.lg-foot{margin-top:24px;font-size:.72rem;color:var(--ink4);text-align:center;line-height:1.6;}
.lg-foot .pill{display:inline-flex;align-items:center;gap:5px;background:var(--ok1);color:#15803D;border-radius:20px;padding:3px 10px;font-weight:700;font-size:.66rem;margin-top:8px;}
.lg-foot .pill svg{width:11px;height:11px;stroke:#16A34A;fill:none;stroke-width:2.4;}

/* ───────────── BUTTONS ───────────── */
.btn{border:none;border-radius:11px;padding:12px 18px;font-family:var(--ff);font-size:.82rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s,box-shadow .2s,background .2s;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}
.btn-p{background:linear-gradient(135deg,#7C5CBF,#3D2582);color:#fff;box-shadow:0 4px 14px rgba(92,62,158,.3);}
.btn-p:hover{box-shadow:0 6px 20px rgba(92,62,158,.42);}
.btn-gold{background:linear-gradient(135deg,#F5A623,#D97706);color:#fff;box-shadow:0 4px 14px rgba(245,166,35,.32);}
.btn-ok{background:linear-gradient(135deg,#16A34A,#14803d);color:#fff;}
.btn-er{background:linear-gradient(135deg,#DC2626,#991B1B);color:#fff;}
.btn-s{background:var(--white);color:var(--t7);border:1.5px solid var(--bd2);}
.btn-s:hover{border-color:var(--t5);background:var(--t0);}
.btn-ghost{background:transparent;color:var(--ink3);}
.btn-ghost:hover{background:var(--t1);color:var(--t7);}
.btn-full{width:100%;}
.btn-sm{padding:8px 13px;font-size:.74rem;border-radius:9px;}
.btn-icon{width:34px;height:34px;padding:0;border-radius:10px;}

/* ───────────── APP SHELL ───────────── */
#app{display:grid;grid-template-columns:252px 1fr;height:100vh;}
#app.hide{display:none;}
.side{background:linear-gradient(180deg,#1A0E3D,#241152 60%,#2D1B69);display:flex;flex-direction:column;overflow:hidden;position:relative;user-select:none;-webkit-user-select:none;}
.side-top{padding:20px 18px 14px;}
.side-brand{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
.side-brand .mk{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#7C5CBF,#3D2582);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(92,62,158,.5);flex-shrink:0;}
.side-brand .mk svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:1.6;}
.side-brand .nm{font-family:var(--fd);font-size:1.12rem;font-weight:800;color:#fff;line-height:1;}
.side-brand .nm b{color:var(--g3);}
.side-brand .rl{font-size:.54rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px;}
.comm-switch{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:10px 11px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;}
.comm-switch:hover{background:rgba(255,255,255,.11);}
.comm-switch .ci{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#F5A623,#D97706);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.comm-switch .ci svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.7;}
.comm-switch .csn{flex:1;min-width:0;}
.comm-switch .csn .t{font-size:.76rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.comm-switch .csn .s{font-size:.56rem;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px;margin-top:1px;}
.comm-switch .csn .s .dot{width:5px;height:5px;border-radius:50%;background:#4ADE80;animation:pulse 1.5s infinite;}
.comm-switch>svg{width:14px;height:14px;stroke:rgba(255,255,255,.4);fill:none;stroke-width:2.2;flex-shrink:0;}
.nav{flex:1;overflow-y:auto;padding:8px 12px 12px;}
.nav::-webkit-scrollbar{width:0;}
.nav-sec{font-size:.54rem;font-weight:800;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:1.6px;padding:14px 10px 7px;}
.nav-i{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.62);font-size:.8rem;font-weight:600;margin-bottom:2px;transition:background .14s,color .14s;position:relative;}
.nav-i svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.9;flex-shrink:0;}
.nav-i:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-i.on{background:linear-gradient(135deg,rgba(124,92,191,.55),rgba(61,37,130,.3));color:#fff;}
.nav-i.on::before{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--g3);}
.nav-i .badge{margin-left:auto;background:var(--g3);color:#1A0E3D;font-size:.58rem;font-weight:800;border-radius:9px;padding:1px 7px;font-family:var(--fm);}
.nav-i .badge.red{background:var(--er);color:#fff;}
.side-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08);}
.host-chip{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:11px;cursor:pointer;transition:background .15s;}
.host-chip:hover{background:rgba(255,255,255,.07);}
.host-chip .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#5B3E9E,#2D1B69);border:2px solid rgba(196,174,232,.3);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:.74rem;color:#fff;flex-shrink:0;}
.host-chip .hn{flex:1;min-width:0;}
.host-chip .hn .t{font-size:.74rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.host-chip .hn .s{font-size:.56rem;color:rgba(255,255,255,.45);}
.host-chip>svg{width:15px;height:15px;stroke:rgba(255,255,255,.45);fill:none;stroke-width:2;}

/* ───────────── MAIN ───────────── */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--t0);}
.topbar{height:64px;flex-shrink:0;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:16px;padding:0 28px;}
.tb-title{flex:1;min-width:0;}
.tb-title .t{font-family:var(--fd);font-size:1.28rem;font-weight:800;color:var(--ink);letter-spacing:-.3px;line-height:1.1;}
.tb-title .s{font-size:.68rem;color:var(--ink3);margin-top:1px;}
.ed-pill{display:inline-flex;align-items:center;gap:7px;background:var(--ok1);border:1px solid rgba(22,163,74,.25);border-radius:11px;padding:7px 13px;}
.ed-pill .dot{width:7px;height:7px;border-radius:50%;background:#16A34A;animation:pulse 1.5s infinite;}
.ed-pill .x{font-size:.66rem;font-weight:800;color:#15803D;}
.ed-pill .d{font-size:.6rem;color:#16A34A;opacity:.8;font-family:var(--fm);}
.tb-act{width:40px;height:40px;border-radius:11px;background:var(--t0);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:background .15s;}
.tb-act:hover{background:var(--t1);}
.tb-act svg{width:18px;height:18px;stroke:var(--t7);fill:none;stroke-width:1.9;}
.tb-act .nb{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;background:var(--er);border-radius:8px;color:#fff;font-size:.54rem;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--white);padding:0 3px;}
.view{flex:1;overflow-y:auto;padding:26px 28px 60px;}
.view-in{max-width:1180px;margin:0 auto;animation:fadeUp .3s cubic-bezier(.22,1,.36,1) both;}

/* ───────────── CARDS / UI ───────────── */
.card{background:var(--white);border:1px solid var(--bd);border-radius:16px;padding:18px;box-shadow:var(--sh);}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;gap:12px;}
.card-h .ttl{font-family:var(--fd);font-size:1.02rem;font-weight:800;color:var(--ink);letter-spacing:-.2px;display:flex;align-items:center;gap:8px;}
.card-h .ttl svg{width:17px;height:17px;stroke:var(--t6);fill:none;stroke-width:2;}
.eyebrow{font-size:.6rem;font-weight:800;color:var(--ink4);text-transform:uppercase;letter-spacing:1.2px;}
.grid{display:grid;gap:16px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1080px){.g4{grid-template-columns:repeat(2,1fr);}}

.kpi{background:var(--white);border:1px solid var(--bd);border-radius:16px;padding:16px 17px;box-shadow:var(--sh);position:relative;overflow:hidden;}
.kpi .ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:13px;}
.kpi .ic svg{width:19px;height:19px;fill:none;stroke-width:2;}
.kpi .val{font-family:var(--fm);font-size:1.8rem;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-.5px;}
.kpi .lbl{font-size:.72rem;color:var(--ink3);font-weight:600;margin-top:5px;}
.kpi .delta{position:absolute;top:16px;right:16px;font-size:.62rem;font-weight:800;display:inline-flex;align-items:center;gap:2px;}
.kpi .delta.up{color:#16A34A;}.kpi .delta.down{color:var(--er);}

.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:16px;font-size:.62rem;font-weight:700;white-space:nowrap;}
.chip svg{width:10px;height:10px;fill:none;stroke-width:2.2;}
.cp{background:var(--t1);color:var(--t7);border:1px solid var(--t2);}
.cg{background:var(--ok1);color:#15803D;border:1px solid rgba(22,163,74,.2);}
.ca{background:var(--g1);color:var(--g5);border:1px solid rgba(245,166,35,.25);}
.ce{background:var(--er1);color:var(--er);border:1px solid rgba(220,38,38,.18);}
.ci{background:var(--in1);color:var(--in);border:1px solid rgba(29,78,216,.18);}
.cn{background:var(--cream2);color:var(--ink3);border:1px solid var(--bd);}

table{width:100%;border-collapse:collapse;}
thead th{text-align:left;font-size:.6rem;font-weight:800;color:var(--ink4);text-transform:uppercase;letter-spacing:.8px;padding:10px 14px;border-bottom:1px solid var(--bd);}
tbody td{padding:13px 14px;border-bottom:1px solid var(--bd);font-size:.8rem;color:var(--ink2);vertical-align:middle;}
tbody tr{transition:background .12s;cursor:pointer;}
tbody tr:hover{background:var(--t0);}
tbody tr:last-child td{border-bottom:none;}
.av-sm{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:.68rem;color:#fff;flex-shrink:0;}
.u-cell{display:flex;align-items:center;gap:10px;}
.u-cell .nm{font-weight:700;color:var(--ink);font-size:.82rem;}
.u-cell .sb{font-size:.64rem;color:var(--ink4);}

.seg{display:inline-flex;background:var(--cream2);border-radius:11px;padding:3px;gap:2px;}
.seg .s{padding:7px 14px;border-radius:9px;font-size:.72rem;font-weight:700;color:var(--ink3);cursor:pointer;transition:all .14s;white-space:nowrap;}
.seg .s.on{background:var(--white);color:var(--t7);box-shadow:var(--sh);}

.bar-track{height:7px;border-radius:4px;background:var(--cream2);overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#7C5CBF,#A07ED4);}
.progress-ring{transform:rotate(-90deg);}

/* day rail (schedule) */
.day-rail{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 10px;}
.dr{flex-shrink:0;min-width:62px;border-radius:13px;border:1.5px solid var(--bd);background:var(--white);padding:9px 8px;text-align:center;cursor:pointer;transition:all .15s;position:relative;}
.dr:hover{border-color:var(--t4);}
.dr .dl{font-size:.54rem;font-weight:800;color:var(--ink4);text-transform:uppercase;letter-spacing:.4px;}
.dr .dn{font-family:var(--fm);font-size:1.15rem;font-weight:700;color:var(--ink);line-height:1.1;margin-top:2px;}
.dr .dd{display:flex;justify-content:center;gap:2px;margin-top:5px;height:5px;}
.dr .dd i{width:5px;height:5px;border-radius:50%;}
.dr.today{background:linear-gradient(150deg,#3D2582,#7C5CBF);border-color:transparent;}
.dr.today .dl,.dr.today .dn{color:#fff;}
.dr.on{border-color:var(--t6);box-shadow:0 0 0 3px rgba(124,92,191,.13);}
.dr .cnt{position:absolute;top:-6px;right:-5px;min-width:17px;height:17px;background:var(--g3);color:#1A0E3D;font-size:.56rem;font-weight:800;border-radius:9px;display:flex;align-items:center;justify-content:center;border:2px solid var(--white);font-family:var(--fm);}
/* vertical calendar */
.vday{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:12px;cursor:pointer;border:1.5px solid transparent;margin-bottom:4px;transition:all .14s;}
.vday:hover{background:var(--t0);}
.vday.on{background:var(--t0);border-color:var(--t6);}
.vd-date{width:44px;height:48px;border-radius:11px;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink2);}
.vday.today .vd-date{background:linear-gradient(150deg,#3D2582,#7C5CBF);color:#fff;}
.vd-date .dn{font-family:var(--fm);font-size:1.12rem;font-weight:700;line-height:1;}
.vd-date .mo{font-size:.5rem;font-weight:800;text-transform:uppercase;opacity:.75;letter-spacing:.5px;margin-top:2px;}
.vd-mid{flex:1;min-width:0;}
.vd-mid .wd{font-size:.74rem;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vd-mid .vd-sub{font-size:.62rem;color:var(--ink3);margin-top:1px;}
.vd-mid .vd-sub.none{color:var(--ink4);}
.vd-cnt{background:var(--t1);color:var(--t7);font-family:var(--fm);font-weight:700;font-size:.66rem;border-radius:8px;padding:3px 9px;flex-shrink:0;}
.vd-add{color:var(--ink4);font-size:1.2rem;font-weight:300;width:24px;text-align:center;flex-shrink:0;line-height:1;}
.vd-live{display:inline-flex;align-items:center;gap:4px;background:var(--ok1);color:#15803D;font-size:.58rem;font-weight:800;border-radius:8px;padding:3px 8px;flex-shrink:0;}
.vd-live i{width:5px;height:5px;border-radius:50%;background:#16A34A;animation:pulse 1.3s infinite;}
.now-banner{border-radius:14px;padding:14px 16px;margin-bottom:16px;color:#fff;background:linear-gradient(135deg,#1A0E3D,#3D2582);}
.cd-pill{font-family:var(--fm);font-weight:700;background:rgba(245,166,35,.18);color:#FDE68A;border:1px solid rgba(245,166,35,.35);border-radius:9px;padding:3px 10px;font-size:.78rem;display:inline-flex;align-items:center;gap:5px;}
.sstrip{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.sstrip .si{display:inline-flex;align-items:center;gap:6px;font-size:.66rem;font-weight:700;border-radius:10px;padding:5px 11px;}

/* function row */
.fn{display:flex;gap:14px;align-items:flex-start;padding:14px;border:1px solid var(--bd);border-radius:14px;background:var(--white);margin-bottom:11px;border-left:4px solid var(--t5);transition:box-shadow .18s,transform .12s;}
.fn:hover{box-shadow:var(--sh2);}
.fn .seq{width:30px;height:30px;border-radius:9px;background:var(--t1);color:var(--t7);font-family:var(--fm);font-weight:700;font-size:.82rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fn .tm{font-family:var(--fm);font-size:.74rem;font-weight:600;color:var(--ink3);min-width:74px;flex-shrink:0;padding-top:5px;}
.fn .body{flex:1;min-width:0;}
.fn .nm{font-size:.92rem;font-weight:700;color:var(--ink);}
.fn .meta{font-size:.66rem;color:var(--ink3);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.fn .meta svg{width:11px;height:11px;stroke:var(--ink4);fill:none;stroke-width:1.9;}
.fn .acts{display:flex;gap:5px;flex-shrink:0;align-items:center;}
.fn.cancelled{opacity:.62;border-left-color:var(--er);}
.fn.cancelled .nm{text-decoration:line-through;}
.fn.postponed{border-left-color:var(--g4);}
.fn.done{border-left-color:var(--ok);}

/* modal */
.ov{position:fixed;inset:0;z-index:300;background:rgba(26,14,61,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s both;}
.ov.on{display:flex;}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:520px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(26,14,61,.4);animation:popUp .32s cubic-bezier(.22,1,.36,1) both;}
.modal.wide{max-width:760px;}
.modal-h{padding:18px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;}
.modal-h .ttl{flex:1;font-family:var(--fd);font-size:1.12rem;font-weight:800;color:var(--ink);}
.modal-h .x{width:32px;height:32px;border-radius:9px;background:var(--cream);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--bd);}
.modal-h .x svg{width:15px;height:15px;stroke:var(--ink3);fill:none;stroke-width:2.4;}
.modal-b{padding:20px;overflow-y:auto;}
.modal-f{padding:14px 20px;border-top:1px solid var(--bd);display:flex;gap:10px;justify-content:flex-end;background:var(--t0);}

/* drawer */
.drawer-ov{position:fixed;inset:0;z-index:200;background:rgba(26,14,61,.5);backdrop-filter:blur(4px);display:none;justify-content:flex-end;animation:fadeIn .2s both;}
.drawer-ov.on{display:flex;}
.drawer{width:440px;max-width:92vw;background:var(--cream);height:100%;overflow-y:auto;animation:slideLeft .34s cubic-bezier(.22,1,.36,1) both;}

.tg{width:42px;height:24px;border-radius:13px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;background:var(--cream2);}
.tg i{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tg.on{background:var(--t6);}.tg.on i{left:21px;}
.cbox{width:19px;height:19px;border-radius:6px;border:2px solid var(--bd2);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .14s;background:#fff;color:#fff;}
.cbox svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:3;}
.cbox.on{background:var(--t6);border-color:var(--t6);}
thead .cbox{border-color:var(--ink4);}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:13px;font-size:.8rem;font-weight:600;z-index:400;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;gap:9px;box-shadow:0 14px 40px rgba(0,0,0,.3);max-width:440px;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.toast svg{width:17px;height:17px;stroke:#4ADE80;fill:none;stroke-width:2.4;flex-shrink:0;}
.toast.wa svg{stroke:#4ADE80;}

.empty{text-align:center;padding:40px 20px;color:var(--ink4);}
.empty svg{width:46px;height:46px;stroke:var(--ink4);fill:none;stroke-width:1.4;margin:0 auto 12px;opacity:.6;}
.empty .t{font-size:.92rem;font-weight:700;color:var(--ink2);}
.empty .s{font-size:.74rem;margin-top:4px;}

label.flbl{display:block;font-size:.66rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;}
.req{color:var(--er);}
.hint{font-size:.66rem;color:var(--ink4);margin-top:5px;line-height:1.5;}
.info-box{background:var(--t0);border:1px solid var(--t1);border-radius:12px;padding:12px 13px;display:flex;gap:10px;font-size:.72rem;color:var(--t7);line-height:1.55;}
.info-box svg{width:16px;height:16px;stroke:var(--t6);fill:none;stroke-width:1.9;flex-shrink:0;margin-top:1px;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
/* kiosk / public display */
.kiosk-ov{position:fixed;inset:0;z-index:500;display:none;background:radial-gradient(circle at 50% -10%,#3D2582,#1A0E3D 72%);color:#fff;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;animation:fadeIn .25s both;}
.kiosk-ov.on{display:flex;}
.kiosk-card{background:#fff;border-radius:26px;padding:26px 24px;box-shadow:0 30px 90px rgba(0,0,0,.45);text-align:center;max-width:400px;width:100%;}
.kiosk-qr{position:relative;display:inline-block;border-radius:16px;overflow:hidden;border:1px solid #eee;}
.kiosk-qr .scan{position:absolute;left:6%;right:6%;height:3px;background:linear-gradient(90deg,transparent,#F5A623,transparent);animation:scanLine 2.2s ease-in-out infinite;}
.kiosk-exit{position:absolute;top:22px;right:22px;width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.kiosk-exit svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.4;}
.kiosk-nav{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
.kiosk-nav:hover{background:rgba(255,255,255,.2);}
.kiosk-nav svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.4;}
.kiosk-ctrlbar{display:flex;gap:12px;align-items:center;margin-top:18px;}
#printArea{display:none;}
@media print{
  #login,#app,#ov,#drawerOv,#kioskOv,.toast{display:none!important;}
  #printArea{display:block!important;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes popUp{0%{opacity:0;transform:scale(.92);}100%{opacity:1;transform:scale(1);}}
@keyframes slideLeft{from{transform:translateX(100%);}to{transform:translateX(0);}}
@keyframes scanLine{0%{top:8%;}50%{top:88%;}100%{top:8%;}}
@keyframes spin{to{transform:rotate(360deg);}}

var schedSel=todayIso();

function daysDone(){var t=new Date(TODAY.y,TODAY.m,TODAY.d);var c=0;editionDays().forEach(function(d){if(new Date(d.y,d.m,d.d)<t)c++;});return c;}
function editionDays(){var out=[];var s=edition.start;for(var i=0;i<edition.days;i++){var dt=new Date(s.y,s.m,s.d+i);out.push({iso:iso(dt.getFullYear(),dt.getMonth(),dt.getDate()),y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate(),wd:WD[dt.getDay()],idx:i+1});}return out;}

    +'</div>'

function afterSchedule(){renderDayList();renderDayPanel();}
function renderDayList(){
  var box=document.getElementById('dayList');if(!box)return;
  box.innerHTML=editionDays().map(function(dy){
    var fns=fnsOn(dy.iso);var act=fns.filter(function(f){return f.status!=='cancelled'&&f.status!=='ended';});
    var isToday=dy.iso===todayIso();var on=dy.iso===schedSel;var hasLive=fns.some(function(f){return f.status==='live';});
    var right=hasLive?'<span class="vd-live"><i></i>Live</span>':(fns.length?'<span class="vd-cnt">'+act.length+'</span>':'<span class="vd-add">+</span>');
    return '<div class="vday'+(on?' on':'')+(isToday?' today':'')+'" onclick="schedSel=\''+dy.iso+'\';afterSchedule()">'
      +'<div class="vd-date"><span class="dn">'+dy.d+'</span><span class="mo">'+MONTHS[dy.m]+'</span></div>'
      +'<div class="vd-mid"><div class="wd">'+dy.wd+' · Day '+dy.idx+(isToday?' · Today':'')+'</div>'

function cdBox(id,lbl){return '<div style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:7px 0 5px;width:48px;text-align:center;"><div id="'+id+'" class="mono" style="font-size:1.2rem;font-weight:700;color:#FDE68A;line-height:1;">00</div><div style="font-size:.46rem;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:1px;margin-top:4px;">'+lbl+'</div></div>';}
function cdSep(){return '<div class="mono" style="font-size:1.2rem;font-weight:700;color:rgba(255,255,255,.35);padding-bottom:14px;">:</div>';}
function startCd(targetMin){
  if(_cdInt){clearInterval(_cdInt);_cdInt=null;}
  var virtual=DEMO_NOW_MIN*60;
  function tick(){
    var h=document.getElementById('cdH');if(!h){if(_cdInt){clearInterval(_cdInt);_cdInt=null;}return;}
    var rem=targetMin*60-virtual;if(rem<0)rem=0;
    var H=Math.floor(rem/3600),M=Math.floor((rem%3600)/60),S=rem%60;
    h.textContent=String(H).padStart(2,'0');
    var em=document.getElementById('cdM');if(em)em.textContent=String(M).padStart(2,'0');
    var es=document.getElementById('cdS');if(es)es.textContent=String(S).padStart(2,'0');
    virtual++;
  }
  tick();_cdInt=setInterval(tick,1000);
}
function renderDayPanel(){

  var upcoming=fns.filter(function(f){return f.status==='scheduled'||f.status==='postponed';});
  var next=isToday?(upcoming.filter(function(f){return t24(f.time)>=DEMO_NOW_MIN;})[0]||upcoming[0]):upcoming[0];
  var doneN=fns.filter(function(f){return f.status==='done';}).length;
  var head='<div class="card-h"><div><div class="disp" style="font-size:1.05rem;font-weight:800;">'+WD[dd.getDay()]+', '+(+dt[2])+' '+MONTHL[+dt[1]-1]+' '+dt[0]+'</div><div style="font-size:.7rem;color:var(--ink3);margin-top:1px;">'+fns.length+' function'+(fns.length===1?'':'s')+(isToday?' · Today':'')+'</div></div>'

  var banner='';

    banner='<div class="now-banner"><div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">';
    if(live)banner+='<div style="flex:1;min-width:170px;"><div style="display:flex;align-items:center;gap:6px;"><span style="width:7px;height:7px;border-radius:50%;background:#4ADE80;animation:pulse 1.3s infinite;"></span><span style="font-size:.56rem;font-weight:800;color:#86EFAC;letter-spacing:.7px;">LIVE NOW</span></div><div style="font-family:var(--fd);font-size:1.05rem;font-weight:800;margin-top:3px;">'+live.name+'</div><div style="font-size:.66rem;color:rgba(255,255,255,.6);">'+live.time+' · '+live.venue+'</div></div>';

      +'<div style="font-size:.62rem;color:rgba(255,255,255,.55);margin-top:1px;">'+next.time+' · '+next.venue+'</div>'
      +'<div style="display:flex;align-items:flex-end;gap:6px;margin-top:9px;">'
        +cdBox('cdH','HRS')+cdSep()+cdBox('cdM','MIN')+cdSep()+cdBox('cdS','SEC')
      +'</div></div>';

  var body;

    body='<div class="empty">'+sIcon('cal')+'<div class="t">No functions yet for this day</div><div class="s">Add the first programme — subscribers see it instantly.</div><button class="btn btn-p btn-sm" style="margin-top:14px;" onclick="openFnModal(null,\''+schedSel+'\')">'+sIcon('plus')+'Add function</button></div>';
  } else {
    body=fns.map(function(f,i){var m=statusMeta(f.status);var off=f.status==='ended';
      return '<div class="fn '+f.status+'"'+(off?' style="opacity:.6;"':'')+'>'
        +'<div class="seq">'+(i+1)+'</div>'
        +'<div class="tm">'+f.time+'<div style="font-size:.58rem;color:var(--ink4);font-weight:400;margin-top:2px;">'+(f.dur||'')+'</div></div>'
        +'<div class="body" style="cursor:pointer;" onclick="openEventDetail('+f.id+')">'
          +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span class="nm">'+f.name+'</span><span class="chip '+m.cls+'">'+m.lbl+'</span></div>'
          +'<div class="meta">'+sIcon('pin')+f.venue+(f.guru?'<span style="margin:0 2px;">·</span>'+sIcon('guru')+community.guru:'')

          +(f.status!=='cancelled'&&!off?'<button class="btn btn-icon btn-s" title="Copy to other dates" onclick="copyFnModal('+f.id+')" style="color:var(--t6);">'+sIcon('layers')+'</button>':'')
          +(f.status==='scheduled'?'<button class="btn btn-icon btn-s" title="Postpone" onclick="postponeFn('+f.id+')" style="color:var(--g5);">'+sIcon('refresh')+'</button>':'')
          +(f.status==='scheduled'||f.status==='postponed'||f.status==='live'?'<button class="btn btn-icon btn-s" title="Turn off (end in app)" onclick="endFn('+f.id+')">'+sIcon('ban')+'</button>':'')

          +(f.status==='scheduled'||f.status==='postponed'||f.status==='live'?'<button class="btn btn-icon btn-s" title="Cancel" onclick="cancelFn('+f.id+')" style="color:var(--er);">'+sIcon('x')+'</button>':'')
          +'<button class="btn btn-icon btn-s" title="Delete" onclick="deleteFn('+f.id+')">'+sIcon('trash')+'</button>'
        +'</div></div>';
    }).join('');
  }
  document.getElementById('dayPanel').innerHTML='<div class="card">'+head+strip+banner+body+'</div>';

function t24(t){var m=(t||'').match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return 0;var h=+m[1];if(/pm/i.test(m[3])&&h!==12)h+=12;if(/am/i.test(m[3])&&h===12)h=0;return h*60+ +m[2];}
function findFn(id){var r=null;Object.keys(programmes).forEach(function(k){programmes[k].forEach(function(f){if(f.id===id)r={f:f,iso:k};});});return r;}

function postponeFn(id){var x=findFn(id);if(!x)return;openConfirm('Postpone this event?','“'+x.f.name+'” will be marked postponed and all subscribers notified on app + WhatsApp.','Yes, postpone','btn-gold',function(){x.f.status='postponed';x.f.note='Postponed — new timing to be confirmed';afterSchedule();pushReminder('postponed',x.f.name,'Rescheduled — please check updated time',true);toast('Postponed · app + WhatsApp alert sent to 1,248 subscribers',true);});}
function cancelFn(id){var x=findFn(id);if(!x)return;openConfirm('Cancel this function?','“'+x.f.name+'” will be marked cancelled and all subscribers notified on app + WhatsApp.','Cancel function','btn-er',function(){x.f.status='cancelled';x.f.note='Cancelled by host';x.f.rem=[];afterSchedule();pushReminder('cancelled',x.f.name,'This programme has been cancelled',true);toast('Cancelled · alert sent to 1,248 subscribers',true);});}
function deleteFn(id){var x=findFn(id);if(!x)return;openConfirm('Delete this function?','“'+x.f.name+'” will be removed from the schedule. This cannot be undone.','Delete','btn-er',function(){programmes[x.iso]=programmes[x.iso].filter(function(f){return f.id!==id;});afterSchedule();toast('Function deleted');});}
function endFn(id){var x=findFn(id);if(!x)return;openConfirm('Turn off this event?','“'+x.f.name+'” will be marked ended and hidden in the app for subscribers. You can reactivate it any time.','Turn off event','btn-s',function(){x.f._prev=x.f.status;x.f.status='ended';x.f.rem=[];afterSchedule();pushReminder('cancelled',x.f.name,'This event has ended',true);toast('Event turned off · now shows as ended in the app',true);});}
function reactivateFn(id){var x=findFn(id);if(!x)return;openConfirm('Reactivate this event?','“'+x.f.name+'” will be active again, shown in the app, and added back to subscribers\u2019 calendars (they\u2019ll be notified).','Yes, reactivate','btn-ok',function(){x.f.status=x.f._prev||'scheduled';afterSchedule();pushReminder('new',x.f.name,'Event is active again · added back to calendar',true);toast('Event reactivated · subscribers notified + calendar updated',true);});}

function addMins(t,mins){var m=t.match(/(\d+):(\d+)\s*(AM|PM)/i);if(!m)return t;var h=+m[1];var mn=+m[2];if(/pm/i.test(m[3])&&h!==12)h+=12;if(/am/i.test(m[3])&&h===12)h=0;var tot=h*60+mn+mins;tot=tot%1440;var hh=Math.floor(tot/60),mm=tot%60;var ap=hh>=12?'PM':'AM';var h12=hh%12;if(h12===0)h12=12;return h12+':'+String(mm).padStart(2,'0')+' '+ap;}
function subHistory(s){
  var out=[];var tnum=new Date(TODAY.y,TODAY.m,TODAY.d);
  editionDays().forEach(function(dy){
    if(new Date(dy.y,dy.m,dy.d)>tnum)return; // only days up to today
    var fns=fnsOn(dy.iso);if(!fns.length)return;
    var lbl=dy.d+' '+MONTHS[dy.m];
    fns.forEach(function(f){
      if(f.status==='cancelled'||f.status==='ended')return;
      var present;
      if(dy.iso===todayIso())present=(attLog[f.id]||[]).indexOf(s.id)>-1;
      else present=((s.id+f.id)%5)!==0; // deterministic past attendance
      var dur=parseInt(f.dur)||2;var outT=present?addMins(f.time,(/min/.test(f.dur)?dur:dur*60)):null;

    });
  });
  return out;
}

function dayRsvp(iso){var total=1248;var seed=0;for(var i=0;i<iso.length;i++)seed+=iso.charCodeAt(i);var responded=Math.round(total*(0.6+(seed%12)/100));var going=Math.round(responded*0.78);var cant=responded-going;var guests=Math.round(going*1.7);return {total:total,responded:responded,going:going,cant:cant,guests:guests,pending:total-responded};}

function upcomingDaysWithEvents(){return editionDays().filter(function(d){return new Date(d.y,d.m,d.d)>=new Date(TODAY.y,TODAY.m,TODAY.d)&&fnsOn(d.iso).some(function(f){return f.status!=='cancelled'&&f.status!=='ended';});});}
function dayEvents(isoStr){return fnsOn(isoStr).filter(function(f){return f.status!=='cancelled'&&f.status!=='ended';}).slice().sort(function(a,b){return t24(a.time)-t24(b.time);});}
function fillBcEvents(){
  var day=document.getElementById('bc-day').value;var ev=document.getElementById('bc-ev');if(!ev)return;

  ev.style.display='block';

function fillRqEvents(){

function sendBroadcast(){
  var ev=document.getElementById('bc-ev');var evVal=(ev&&ev.style.display!=='none')?ev.value:'';

  var app=document.getElementById('bc-app').classList.contains('on');

  var fnName='General announcement';
  if(evVal){if(evVal.indexOf('day:')===0){var p=evVal.slice(4).split('-');fnName='All events · '+(+p[2])+' '+MONTHS[+p[1]-1];}else{var x=findFn(+evVal);if(x)fnName=x.f.name;}}
  var ch=[];if(app)ch.push('app');if(wa)ch.push('wa');
  reminders.unshift({id:Date.now(),kind:'reminder',fn:fnName,when:'Just now',msg:msg,ch:ch,reach:1248,status:'sent'});

function saveDonation(){
  if(!donPickId){toast('Select a subscriber first');return;}
  var amt=parseInt(document.getElementById('d-amt').value)||0;if(!amt){toast('Enter an amount');return;}
  var dval=document.getElementById('d-date').value;var dlabel=dval?fmtIsoDM(dval):'22 May 2026';
  var email=(document.getElementById('d-email').value||'').trim();
  var d={id:Date.now(),no:++_rcptSeq,sub:donPickId,amt:amt,date:dlabel,mode:document.getElementById('d-mode').value,purpose:document.getElementById('d-purp').value||'General',email:email};
  donations.unshift(d);
  var s=subscribers.filter(function(x){return x.id===donPickId;})[0];s.donated+=amt;

function findDon(id){return donations.filter(function(d){return d.id===id;})[0];}
function receiptNo(d){return 'IK/2026/'+String(d.no).padStart(4,'0');}
function amtWords(n){if(n===0)return 'Zero';var a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];var b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];function two(x){return x<20?a[x]:b[Math.floor(x/10)]+(x%10?' '+a[x%10]:'');}function three(x){return (x>=100?a[Math.floor(x/100)]+' Hundred'+(x%100?' ':''):'')+(x%100?two(x%100):'');}var out='';var cr=Math.floor(n/10000000);n%=10000000;var la=Math.floor(n/100000);n%=100000;var th=Math.floor(n/1000);n%=1000;if(cr)out+=three(cr)+' Crore ';if(la)out+=two(la)+' Lakh ';if(th)out+=two(th)+' Thousand ';if(n)out+=three(n);return out.trim();}
function openReceipt(id,justSent){
  var d=findDon(id);if(!d)return;var s=subscribers.filter(function(x){return x.id===d.sub;})[0];
  openModal('<div class="modal" style="max-width:460px;"><div class="modal-h"><div class="ttl">Donation receipt</div><div class="x" onclick="closeModal()">'+sIcon('x')+'</div></div>'
    +'<div class="modal-b">'
    +(justSent?'<div class="info-box" style="margin-bottom:14px;background:var(--ok1);border-color:rgba(22,163,74,.25);"><span style="color:#16A34A;">'+sIcon('check')+'</span><div style="color:#15803D;">Recorded! Receipt emailed'+(d.email?' to <b>'+d.email+'</b>':'')+' and a thank-you message sent on <b>WhatsApp</b> ('+s.phone+'). No app notification is sent.</div></div>':'')
    +'<div style="border:1px solid var(--bd);border-radius:14px;overflow:hidden;">'
      +'<div style="background:linear-gradient(135deg,#1A0E3D,#3D2582);color:#fff;padding:16px 18px;"><div style="font-family:var(--fd);font-weight:800;font-size:1.05rem;">'+community.name+'</div><div style="font-size:.62rem;color:rgba(255,255,255,.6);margin-top:2px;">Official Donation Receipt</div></div>'
      +'<div style="padding:16px 18px;">'
        +'<div style="display:flex;justify-content:space-between;font-size:.66rem;color:var(--ink4);margin-bottom:12px;"><span>Receipt No.<br><b class="mono" style="color:var(--ink);font-size:.78rem;">'+receiptNo(d)+'</b></span><span style="text-align:right;">Date<br><b style="color:var(--ink);font-size:.78rem;">'+d.date+'</b></span></div>'
        +receiptRow('Received with thanks from',s.name)
        +receiptRow('Contact',s.phone)
        +receiptRow('Purpose',d.purpose)
        +receiptRow('Payment mode',d.mode)
        +'<div style="background:var(--g1);border:1px solid rgba(245,166,35,.3);border-radius:11px;padding:12px 14px;margin-top:12px;"><div style="font-size:.62rem;color:var(--g5);font-weight:700;text-transform:uppercase;letter-spacing:.5px;">Amount received</div><div class="mono" style="font-size:1.5rem;font-weight:800;color:var(--g5);">'+money(d.amt)+'</div><div style="font-size:.64rem;color:var(--ink3);font-style:italic;">Rupees '+amtWords(d.amt)+' only</div></div>'
        +'<div style="font-size:.66rem;color:var(--ink3);margin-top:12px;line-height:1.6;">With heartfelt gratitude for your generous contribution to '+community.name+'. May your kindness be blessed. 🙏</div>'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:16px;"><div style="font-size:.58rem;color:var(--ink4);">Computer-generated receipt</div><div style="text-align:center;"><div style="border-top:1px solid var(--ink3);padding-top:3px;font-size:.6rem;color:var(--ink3);width:120px;">Authorised signatory</div></div></div>'
      +'</div>'
    +'</div></div>'
    +'<div class="modal-f" style="flex-wrap:wrap;gap:8px;"><button class="btn btn-s btn-sm" onclick="emailReceipt('+d.id+')">'+sIcon('send')+'Email receipt</button><button class="btn btn-s btn-sm" onclick="waThankYou('+d.id+')">'+sIcon('wa')+'WhatsApp thank-you</button><button class="btn btn-p btn-sm" onclick="printReceipt('+d.id+')">'+sIcon('layers')+'Print receipt</button></div></div>');
}
function receiptRow(k,v){return '<div style="display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px dashed var(--bd);"><span style="font-size:.68rem;color:var(--ink4);">'+k+'</span><span style="font-size:.74rem;font-weight:600;color:var(--ink);text-align:right;">'+v+'</span></div>';}
function emailReceipt(id){var d=findDon(id);toast('Receipt '+receiptNo(d)+' emailed'+(d.email?' to '+d.email:' to donor'));}
function waThankYou(id){var d=findDon(id);var s=subscribers.filter(function(x){return x.id===d.sub;})[0];toast('Thank-you message sent to '+s.name+' on WhatsApp',true);}
function printReceipt(id){
  var d=findDon(id);if(!d)return;var s=subscribers.filter(function(x){return x.id===d.sub;})[0];
  document.getElementById('printArea').innerHTML='<div style="max-width:640px;margin:0 auto;padding:42px 40px;font-family:Sora,sans-serif;color:#1A1028;">'
    +'<div style="border:2px solid #3D2582;border-radius:18px;overflow:hidden;">'
    +'<div style="background:#3D2582;color:#fff;padding:20px 26px;text-align:center;"><div style="font-family:Fraunces,serif;font-size:1.5rem;font-weight:800;">'+community.name+'</div><div style="font-size:.72rem;letter-spacing:2px;text-transform:uppercase;margin-top:4px;opacity:.8;">Official Donation Receipt</div></div>'
    +'<div style="padding:26px;">'
      +'<div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:18px;"><span>Receipt No.: <b class="mono">'+receiptNo(d)+'</b></span><span>Date: <b>'+d.date+'</b></span></div>'
      +'<table style="width:100%;border-collapse:collapse;font-size:.86rem;">'
        +'<tr><td style="padding:8px 0;color:#6B5A8A;width:42%;">Received with thanks from</td><td style="padding:8px 0;font-weight:700;">'+s.name+'</td></tr>'
        +'<tr><td style="padding:8px 0;color:#6B5A8A;">Contact</td><td style="padding:8px 0;font-weight:700;">'+s.phone+'</td></tr>'

      +'<div style="font-size:.84rem;color:#3D2D5C;line-height:1.7;">With heartfelt gratitude for your generous contribution to '+community.name+'. Your support sustains our community programmes. May your kindness be blessed.</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:38px;"><div style="font-size:.7rem;color:#A89BC0;max-width:55%;">'+(community.venue||'')+'<br>'+(community.venueAddr||'')+'<br>Helpline: '+community.helpline+'</div><div style="text-align:center;"><div style="border-top:1.5px solid #1A1028;padding-top:4px;font-size:.74rem;width:160px;">Authorised signatory</div></div></div>'
      +'<div style="text-align:center;font-size:.64rem;color:#A89BC0;margin-top:22px;border-top:1px solid #eee;padding-top:12px;">This is a computer-generated receipt and does not require a physical signature. · Powered by Invite Karoo</div>'

function fmtIsoDM(v){var p=v.split('-');return (+p[2])+' '+MONTHS[+p[1]-1]+' '+p[0];}
function bulkDayModal(){
  var withFns=editionDays().filter(function(d){return fnsOn(d.iso).filter(function(f){return f.status!=='cancelled'&&f.status!=='ended';}).length;});
  var days=editionDays();
  openModal('<div class="modal"><div class="modal-h"><div class="ttl">Copy a full day</div><div class="x" onclick="closeModal()">'+sIcon('x')+'</div></div>'
    +'<div class="modal-b"><div class="hint" style="margin-bottom:12px;">Reuse a whole day\u2019s routine across other days instead of re-adding each event.</div>'
    +'<label class="flbl">Copy all events from</label><select id="bd-from">'+withFns.map(function(d){return '<option value="'+d.iso+'">Day '+d.idx+' · '+d.d+' '+MONTHS[d.m]+' ('+fnsOn(d.iso).filter(function(f){return f.status!=='cancelled'&&f.status!=='ended';}).length+' events)</option>';}).join('')+'</select>'
    +'<label class="flbl" style="margin-top:14px;">Paste onto these days</label>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;" id="bd-to">'+days.map(function(dy){return '<div class="chip cn" data-iso="'+dy.iso+'" onclick="this.classList.toggle(\'cp\');this.classList.toggle(\'cn\')" style="cursor:pointer;padding:6px 11px;font-size:.66rem;">'+dy.d+' '+MONTHS[dy.m]+'</div>';}).join('')+'</div></div>'
    +'<div class="modal-f"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="doCopyDay()">'+sIcon('check')+'Copy day</button></div></div>');
}
function doCopyDay(){
  var from=document.getElementById('bd-from').value;var src=fnsOn(from).filter(function(f){return f.status!=='cancelled'&&f.status!=='ended';});
  var to=[];document.querySelectorAll('#bd-to .chip.cp').forEach(function(c){var iv=c.getAttribute('data-iso');if(iv!==from)to.push(iv);});
  if(!to.length){toast('Pick at least one day to paste onto');return;}
  to.forEach(function(tIso){src.forEach(function(f){var o={};for(var k in f)o[k]=f[k];o.id=++_fnId;o.status='scheduled';o.note=undefined;if(!programmes[tIso])programmes[tIso]=[];programmes[tIso].push(o);});});
  pushReminder('new',src.length+' events',' copied to '+to.length+' day(s) · calendars updated',true);
  closeModal();afterSchedule();toast(src.length+' events copied to '+to.length+' day(s) · subscribers notified',true);
}
function copyFnModal(id){
  var x=findFn(id);if(!x)return;var f=x.f;var days=editionDays();
  openModal('<div class="modal"><div class="modal-h"><div class="ttl">Copy “'+f.name+'” to other dates</div><div class="x" onclick="closeModal()">'+sIcon('x')+'</div></div>'
    +'<div class="modal-b"><div class="info-box" style="margin-bottom:14px;">'+sIcon('layers')+'<div>Same event, same time ('+f.time+'), copied to every date you pick — no need to recreate it each day.</div></div>'
    +'<label class="flbl">Pick dates</label>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;" id="cf-to">'+days.map(function(dy){var has=fnsOn(dy.iso).some(function(g){return g.name===f.name;});return '<div class="chip '+(has?'cg':'cn')+'" data-iso="'+dy.iso+'"'+(has?'':' onclick="this.classList.toggle(\'cp\');this.classList.toggle(\'cn\')"')+' style="cursor:'+(has?'default':'pointer')+';padding:6px 11px;font-size:.66rem;">'+dy.d+' '+MONTHS[dy.m]+(has?' ✓':'')+'</div>';}).join('')+'</div>'
    +'<div class="hint" style="margin-top:8px;">Green = event already on that day.</div></div>'
    +'<div class="modal-f"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="doCopyFn('+id+')">'+sIcon('check')+'Copy event</button></div></div>');
}
function doCopyFn(id){
  var x=findFn(id);if(!x)return;var f=x.f;
  var to=[];document.querySelectorAll('#cf-to .chip.cp').forEach(function(c){to.push(c.getAttribute('data-iso'));});
  if(!to.length){toast('Pick at least one date');return;}
  to.forEach(function(tIso){var o={};for(var k in f)o[k]=f[k];o.id=++_fnId;o.status='scheduled';o.note=undefined;if(!programmes[tIso])programmes[tIso]=[];programmes[tIso].push(o);});
  pushReminder('new',f.name,'Added on '+to.length+' more day(s) · auto-added to calendar',true);
  closeModal();afterSchedule();toast('“'+f.name+'” copied to '+to.length+' date(s) · subscribers notified',true);
}
function evTile(ic,val,lbl){return '<div style="background:rgba(255,255,255,.08);border-radius:11px;padding:10px 11px;">'
  +'<div style="width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;margin-bottom:7px;"><svg viewBox="0 0 24 24" fill="none" stroke="#FDE68A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;">'+(IC[ic]||'')+'</svg></div>'

      +'<div class="eyebrow" style="margin-bottom:6px;">About this event</div><div style="font-size:.8rem;color:var(--ink2);line-height:1.6;margin-bottom:16px;">'+desc+'</div>'
      +'<div class="grid g2" style="gap:12px;">'
        +'<div style="border:1px solid var(--bd);border-radius:13px;padding:13px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><div style="width:30px;height:30px;border-radius:8px;background:var(--er1);color:var(--er);display:flex;align-items:center;justify-content:center;">'+sIcon('send')+'</div><div style="font-size:.7rem;font-weight:700;color:var(--ink);">YouTube live</div></div><div class="mono" style="font-size:.62rem;color:var(--ink3);word-break:break-all;margin-bottom:8px;">'+yt+'</div><button class="btn btn-s btn-sm btn-full" onclick="toast(\'Opening live stream…\')">Open live stream</button></div>'

      +'</div>'
      +(f.rem&&f.rem.length?'<div class="info-box" style="margin-top:14px;">'+sIcon('bell')+'<div>Reminders to subscribers: '+f.rem.map(remLabel).join(', ')+' before · app + WhatsApp.</div></div>':'')
    +'</div>'
    +'<div class="modal-f">'+(f.status!=='cancelled'&&f.status!=='ended'?'<button class="btn btn-s" onclick="closeModal();openFnModal('+id+')">'+sIcon('edit')+'Edit event</button>':'')+'<button class="btn btn-p" onclick="closeModal()">Done</button></div></div>');
}

window._afterHooks=function(id){if(id==='schedule')afterSchedule();if(id==='subscribers')renderSubRows();if(id==='attendance')renderAttDetail();if(id==='analytics'){renderAttChart();renderFnBreak();}if(id==='reminders')renderRemAuto();if(id==='rsvp'){renderRsvpKpis();renderRsvpBody();}if(id==='access')renderAccessRows();};

document.querySelectorAll('.lg-otp input').forEach(function(inp,i,all){inp.addEventListener('input',function(){if(this.value&&all[i+1])all[i+1].focus();});});
